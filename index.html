<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMON MaMa MOVE FILM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Correct Monitag SDK -->
<script src='//libtl.com/sdk.js' data-zone='10823841' data-sdk='show_10823841'></script>

<style>
:root { --primary: #00e6ff; }

body { 
    margin: 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #fff200, #ffd000, #ffae00);
    color: #000; 
    padding: 15px; 
    min-height: 100vh;
    overflow-y: auto;
}

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

.logo { 
    font-size: 24px; font-weight: bold;
    background: linear-gradient(45deg, #ff00ff, #00e6ff, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.user-info {
    font-size: 14px;
    background: rgba(0,0,0,0.1);
    padding: 5px 12px;
    border-radius: 20px;
}

.search-container { margin-bottom: 25px; }

.search-container input {
    width: 100%;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    background: rgba(0,0,0,0.1);
    color: #000;
}

/* glowing thumbnail */
.video-card { 
    border-radius: 18px; 
    margin-bottom: 30px; 
    overflow: hidden; 
    cursor: pointer; 
    padding: 6px;
    background: linear-gradient(45deg, red, yellow, lime, cyan, blue, magenta, red);
    background-size: 400%;
    animation: glowBorder 4s linear infinite;
    box-shadow: 0 0 20px rgba(255,255,0,0.8);
}

@keyframes glowBorder {
    0% { background-position: 0 0; }
    100% { background-position: 400% 0; }
}

.inner-card {
    background: #111;
    border-radius: 14px;
    overflow: hidden;
}

.thumb { position: relative; height: 210px; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }

.play { 
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    background: var(--primary); width:55px; height:55px; border-radius:50%;
    display:flex; justify-content:center; align-items:center;
}

.info { 
    padding:15px; text-align:center; font-weight:bold; color:#fff; font-size:16px;
}

#modal { 
    display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999;
}

#player-container { 
    width:100%; height:100%; display:flex; justify-content:center; align-items:center;
}

iframe { width:100%; height:90vh; border:none; }

.close { 
    position:absolute; top:15px; right:20px; font-size:35px; cursor:pointer; color:#fff;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">EMON MaMa MOVE FILM</div>
    <div id="user-display" class="user-info">Guest</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search Episodes (57-80)..." onkeyup="filterEpisodes()">
</div>

<div id="grid"></div>

<div id="modal">
    <span class="close" onclick="closePlayer()">✕</span>
    <div id="player-container"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;
if (user) document.getElementById('user-display').innerText = user.first_name || "User";

const linkGroup1 = "https://dl.springsfern.in/wt/AAAAAbjepQNS-EhPAAAfDg/0QhSeBvOSNAH27EEDv5Li3KraHhzxO59Tg_GuuP4VY8";
const linkGroup2 = "https://dl.springsfern.in/wt/AAAAAbjepQNQKdhdAAAdlQ/2vdrL8Du9-Y0YaruJdjWVYoGfKUVQx87NpY6SFBwpZ0";
const linkGroup3 = "https://dl.springsfern.in/wt/AAAAAbjepQNR8Oa5AAAwLw/xGBH0nYS-HP7IasOY4uwTQ5QWNvqghgD5710WXhzqpE";

const videos = [];

for (let i = 57; i <= 80; i++) {
    let currentLink = "";
    if (i <= 64) currentLink = linkGroup1;
    else if (i <= 72) currentLink = linkGroup2;
    else currentLink = linkGroup3;

    videos.push({
        id: i,
        title: `Bachelor Point Episode ${i}`, // ❗ Episode name visible
        link: currentLink,
        thumb: `thumbs/${i}.jpg`
    });
}

function load(data) {
    document.getElementById("grid").innerHTML = data.map(v => 
    `<div class="video-card" onclick="handlePlayClick('${v.link}')">
        <div class="inner-card">
            <div class="thumb">
                <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/400x200/111/00e6ff?text=Episode+${v.id}'">
                <div class="play">▶</div>
            </div>
            <div class="info">${v.title}</div>
        </div>
    </div>`
    ).join('');
}

function filterEpisodes() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = videos.filter(v => v.title.toLowerCase().includes(query) || v.id.toString().includes(query));
    load(filtered);
}

function handlePlayClick(url) {
    if (!url) return;

    // 🎯 first show ad
    if (typeof show_10823841 === 'function') {
        try {
            show_10823841().then(() => {
                // after ad watched
                openPlayer(url);
            }).catch(() => {
                openPlayer(url);
            });
        } catch (e) {
            openPlayer(url);
        }
    } else {
        openPlayer(url);
    }
}

function openPlayer(url) {
    document.getElementById("modal").style.display = "block";

    // embed iframe
    document.getElementById("player-container").innerHTML = 
    `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;

    // fallback if iframe blocked
    setTimeout(() => {
        window.open(url, "_blank");
    }, 2500);
}

function closePlayer() {
    document.getElementById("player-container").innerHTML = "";
    document.getElementById("modal").style.display = "none";
}

load(videos);
</script>

</body>
  </html>
