<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMON MaMa MOVE FILM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src='//niphaumeet.com/pfe/current/tag.min.js?z=10823841' data-cfasync='false' async></script>

<style>
:root { --primary: #00e6ff; }

body { 
    margin: 0; 
    font-family: 'Segoe UI', sans-serif; 
    background: linear-gradient(135deg, #fff200, #ffd000, #ffae00);
    color: #000; 
    padding: 15px; 
    min-height: 100vh;
}

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.logo { 
    font-size: 22px; font-weight: bold;
    background: linear-gradient(45deg, #ff0000, #000, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.user-info { font-size: 14px; background: rgba(0,0,0,0.1); padding: 5px 12px; border-radius: 20px; }

.search-container input {
    width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(0,0,0,0.2);
    box-sizing: border-box; margin-bottom: 20px;
}

.grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

.video-card { 
    border-radius: 18px; overflow: hidden; cursor: pointer; padding: 4px;
    background: linear-gradient(45deg, red, yellow, lime, cyan, blue, magenta, red);
    background-size: 400%; animation: glowBorder 4s linear infinite;
}

@keyframes glowBorder { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

.inner-card { background: #111; border-radius: 14px; overflow: hidden; }
.thumb { position: relative; height: 200px; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }

.play-btn { 
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    background: var(--primary); width:50px; height:50px; border-radius:50%;
    display:flex; justify-content:center; align-items:center; font-size: 20px;
}

.info { padding:15px; text-align:center; font-weight:bold; color:#fff; }

/* Modal Styles */
#modal { 
    display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
    background:#000; z-index:9999; 
}
#player-container { width:100%; height:100%; }
iframe { width:100%; height:100%; border:none; }
.close-btn { 
    position:absolute; top:10px; right:20px; font-size:40px; 
    color:#fff; cursor:pointer; z-index:10000;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">EMON MaMa MOVE FILM</div>
    <div id="user-display" class="user-info">Guest</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search Episodes (57-80)..." onkeyup="filterEpisodes()">
</div>

<div id="grid" class="grid"></div>

<div id="modal">
    <span class="close-btn" onclick="closePlayer()">×</span>
    <div id="player-container"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;
if (user) document.getElementById('user-display').innerText = user.first_name;

const linkGroup1 = "https://dl.springsfern.in/wt/AAAAAbjepQNS-EhPAAAfDg/0QhSeBvOSNAH27EEDv5Li3KraHhzxO59Tg_GuuP4VY8";
const linkGroup2 = "https://dl.springsfern.in/wt/AAAAAbjepQNQKdhdAAAdlQ/2vdrL8Du9-Y0YaruJdjWVYoGfKUVQx87NpY6SFBwpZ0";
const linkGroup3 = "https://dl.springsfern.in/wt/AAAAAbjepQNR8Oa5AAAwLw/xGBH0nYS-HP7IasOY4uwTQ5QWNvqghgD5710WXhzqpE";

const videos = [];
for (let i = 57; i <= 80; i++) {
    let link = (i <= 64) ? linkGroup1 : (i <= 72) ? linkGroup2 : linkGroup3;
    videos.push({ id: i, title: `Bachelor Point Ep ${i}`, link: link });
}

function load(data) {
    document.getElementById("grid").innerHTML = data.map(v => `
        <div class="video-card" onclick="handlePlay('${v.link}')">
            <div class="inner-card">
                <div class="thumb">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg" style="filter: hue-rotate(${v.id * 10}deg);">
                    <div class="play-btn">▶</div>
                </div>
                <div class="info">${v.title}</div>
            </div>
        </div>
    `).join('');
}

function filterEpisodes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    load(videos.filter(v => v.title.toLowerCase().includes(q) || v.id.toString().includes(q)));
}

function handlePlay(url) {
    // Monetag Ad Trigger (Standard way)
    if (typeof show_10823841 === 'function') {
        show_10823841().then(() => { openPlayer(url); }).catch(() => { openPlayer(url); });
    } else {
        // If SDK not loaded, open a direct ad link as fallback or just play
        openPlayer(url);
    }
}

function openPlayer(url) {
    const modal = document.getElementById("modal");
    const container = document.getElementById("player-container");
    modal.style.display = "block";
    
    // Iframe and Fallback
    container.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    
    // ভিডিও যদি আইফ্রেমে লোড না হয়, তবে ৩ সেকেন্ড পর সরাসরি লিঙ্কে নিয়ে যাবে
    setTimeout(() => {
        if(modal.style.display === "block") {
            window.open(url, '_blank');
        }
    }, 3000);
}

function closePlayer() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("player-container").innerHTML = "";
}

load(videos);
</script>
</body>
</html>
